<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<head>
    <title>Generate a Triforce Blitz seed</title>
    <script type="importmap">
        {
            "imports": {
                "@stomp/stompjs": "/webjars/stomp__stompjs/esm6/index.js"
            }
        }
    </script>
    <script th:src="@{/webjars/stomp__stompjs/bundles/stomp.umd.min.js}"></script>
    <script th:src="@{/scripts/generator.js}" type="module" defer></script>
</head>

<body>

<main layout:fragment="content">
    <form name="generator-form" method="post" th:action="@{/generator/generate}" th:object="${form}">
        <div class="form-group">
            <label for="generator-version">Version</label>
            <select id="generator-version" th:field="*{version}"
                    hx-get="/generator/options" hx-target="#generator-options" hx-swap="outerHTML">
                <option th:each="v : ${versions}" th:value="${v}" th:text="${v}">7.1.143-blitz-0.43</option>
            </select>
        </div>

        <div id="generator-options"
             th:replace="~{generator/fragments/options :: options(${seasons}, *{season})}">
        </div>

        <div class="form-group">
            <input id="generator-submit" type="submit" value="Generate">
        </div>

        <div class="generator-log" id="generator-log">

        </div>
    </form>
</main>

</body>
</html>
