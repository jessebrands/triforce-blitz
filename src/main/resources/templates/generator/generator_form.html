<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<head>
    <title>Generate a Triforce Blitz seed</title>
</head>

<body>

<main layout:fragment="content">
    <form name="generator-form" method="post" th:action="@{/generator/generate}" th:object="${form}">
        <div class="form-group">
            <label for="version">Version</label>
            <select id="version" th:field="*{version}">
                <option th:each="v : ${versions}" th:value="${v}" th:text="${v}">7.1.143-blitz-0.43</option>
            </select>
        </div>

        <div class="form-group">
            <label th:each="s : ${seasons}">
                <input type="radio" th:field="*{season}" th:value="${s.uuid}">
                <span th:text="${'Season ' + s.name}">Season 1</span>
            </label>
        </div>

        <div class="form-group">
            <input type="submit" value="Generate">
        </div>
    </form>
</main>

</body>
</html>
